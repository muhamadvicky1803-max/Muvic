<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kado Ulang Tahun 🎁</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #FFD6DE;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 30px 20px 60px;
      font-family: 'Nunito', sans-serif;
      position: relative;
    }

    /* Floating hearts background */
    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart-float {
      position: absolute;
      font-size: 18px;
      opacity: 0.18;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.18; }
      100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
    }

    /* Play button */
    #playBtn {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 100;
      background: white;
      border: 2.5px solid #E8637A;
      color: #E8637A;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      box-shadow: 0 3px 12px rgba(232,99,122,0.2);
      transition: background 0.2s, color 0.2s;
    }
    #playBtn:hover { background: #E8637A; color: white; }
    #playBtn .note { font-size: 17px; }

    /* Card */
    .card-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      margin-top: 30px;
    }

    .card {
      background: #FFFDF8;
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(200,80,100,0.13);
      overflow: hidden;
      padding: 18px 18px 22px;
      animation: cardIn 0.5s cubic-bezier(.4,1.4,.6,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.93) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Photo */
    .photo-frame {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f0e8ea;
      position: relative;
    }
    .photo-frame img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      border-radius: 14px;
    }
    /* placeholder shown when no image */
    .photo-placeholder {
      width: 100%;
      height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #fce4ec, #f8bbd0);
      border-radius: 14px;
      color: #c06070;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 2px dashed #e8637a;
    }
    .photo-placeholder .upload-icon { font-size: 40px; }

    /* Caption */
    .caption {
      text-align: center;
      margin-top: 18px;
      font-family: 'Dancing Script', cursive;
      font-size: 20px;
      color: #3a2a2a;
      line-height: 1.6;
      padding: 0 6px;
    }

    /* Slide counter */
    .slide-counter {
      text-align: center;
      margin-top: 14px;
      color: #bbb;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    /* Navigation */
    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 22px;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }
    .nav-btn {
      background: white;
      border: 2.5px solid #E8637A;
      color: #E8637A;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 12px rgba(232,99,122,0.15);
      transition: background 0.2s, color 0.2s, transform 0.15s;
    }
    .nav-btn:hover { background: #E8637A; color: white; transform: scale(1.08); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    .close-btn {
      background: linear-gradient(135deg, #E8637A, #f48a9a);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 30px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.5px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(232,99,122,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      display: none;
    }
    .close-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(232,99,122,0.45); }

    /* Upload hint */
    .upload-hint {
      text-align: center;
      color: #E8637A;
      font-size: 12.5px;
      margin-top: 10px;
      opacity: 0.75;
      position: relative;
      z-index: 1;
    }

    /* Hidden file input */
    #fileInput { display: none; }
  </style>
</head>
<body>

  <!-- Floating hearts -->
  <div class="hearts-bg" id="heartsContainer"></div>

  <!-- Music -->
  <audio id="bgMusic" loop>
    <!-- Ganti src dengan link lagu pilihanmu -->
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg" />
  </audio>

  <!-- Play Button -->
  <button id="playBtn" onclick="toggleMusic()">
    <span class="note">🎵</span> <span id="playLabel">Play</span>
  </button>

  <!-- Card -->
  <div class="card-wrapper">
    <div class="card" id="mainCard">

      <!-- Photo -->
      <div class="photo-frame">
        <div class="photo-placeholder" id="photoPlaceholder" onclick="document.getElementById('fileInput').click()">
          <span class="upload-icon">🎁</span>
          <span>Tap untuk upload foto</span>
        </div>
        <img id="slideImg" src="" alt="Foto" style="display:none;" />
      </div>

      <!-- Caption -->
      <div class="caption" id="slideCaption">
        Nah ini salah satu foto paling favorit aku. Liat senyum kamu aja udah bikin capek aku ilang semua.. always be my home yaa sayang &lt;3 🏠👫
      </div>

      <!-- Counter -->
      <div class="slide-counter" id="slideCounter">1 / 1</div>

    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-row" id="navRow">
    <button class="nav-btn" id="prevBtn" disabled onclick="changeSlide(-1)">‹</button>
    <button class="close-btn" id="closeBtn" onclick="closeBuku()">TUTUP BUKU 📕</button>
    <button class="nav-btn" id="nextBtn" disabled onclick="changeSlide(1)">›</button>
  </div>

  <p class="upload-hint">💡 Tap foto di atas untuk upload gambarmu sendiri</p>

  <!-- Hidden file input -->
  <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)" />

  <script>
    // ─── SLIDE DATA ───────────────────────────────────────────────
    // Tambah/edit slides di sini!
    const slides = [
      {
        img: "",   // kosong = tampil placeholder; isi dengan URL atau biarkan kosong untuk upload manual
        caption: "Nah ini salah satu foto paling favorit aku. Liat senyum kamu aja udah bikin capek aku ilang semua.. always be my home yaa sayang &lt;3 🏠👫"
      }
    ];
    // ──────────────────────────────────────────────────────────────

    let current = 0;
    let uploadedImages = {}; // store uploaded images per slide index

    function renderSlide() {
      const s = slides[current];
      const img = document.getElementById('slideImg');
      const placeholder = document.getElementById('photoPlaceholder');
      const caption = document.getElementById('slideCaption');
      const counter = document.getElementById('slideCounter');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const closeBtn = document.getElementById('closeBtn');

      // Photo
      const src = uploadedImages[current] || s.img;
      if (src) {
        img.src = src;
        img.style.display = 'block';
        placeholder.style.display = 'none';
      } else {
        img.style.display = 'none';
        placeholder.style.display = 'flex';
      }

      // Caption
      caption.innerHTML = s.caption;

      // Counter
      counter.textContent = `${current + 1} / ${slides.length}`;

      // Nav buttons
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === slides.length - 1;

      // Close button on last slide
      closeBtn.style.display = current === slides.length - 1 ? 'block' : 'none';

      // Card animation
      const card = document.getElementById('mainCard');
      card.style.animation = 'none';
      requestAnimationFrame(() => { card.style.animation = 'cardIn 0.4s cubic-bezier(.4,1.4,.6,1) both'; });
    }

    function changeSlide(dir) {
      const next = current + dir;
      if (next < 0 || next >= slides.length) return;
      current = next;
      renderSlide();
    }

    function closeBuku() {
      document.querySelector('.card').style.transform = 'scale(0.9)';
      document.querySelector('.card').style.opacity = '0';
      setTimeout(() => {
        document.querySelector('.card').innerHTML = `
          <div style="text-align:center;padding:40px 20px;font-family:'Dancing Script',cursive;">
            <div style="font-size:52px;margin-bottom:16px;">🎁💖</div>
            <div style="font-size:24px;color:#E8637A;line-height:1.5;">
              Makasih udah baca sampai sini...<br>Semoga hari ini jadi hari<br>yang paling indah buat kamu! 🥰
            </div>
          </div>`;
        document.querySelector('.card').style.transform = 'scale(1)';
        document.querySelector('.card').style.opacity = '1';
        document.getElementById('navRow').style.display = 'none';
        document.querySelector('.upload-hint').style.display = 'none';
      }, 300);
    }

    // ─── Music ────────────────────────────────────────────────────
    let playing = false;
    function toggleMusic() {
      const audio = document.getElementById('bgMusic');
      const label = document.getElementById('playLabel');
      if (playing) {
        audio.pause();
        label.textContent = 'Play';
      } else {
        audio.play().catch(() => {});
        label.textContent = 'Pause';
      }
      playing = !playing;
    }

    // ─── Image Upload ─────────────────────────────────────────────
    function handleImageUpload(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedImages[current] = e.target.result;
        renderSlide();
      };
      reader.readAsDataURL(file);
    }

    // ─── Floating Hearts ──────────────────────────────────────────
    const container = document.getElementById('heartsContainer');
    const emojis = ['💖', '💕', '🩷', '✨', '💗', '🌸'];
    for (let i = 0; i < 14; i++) {
      const h = document.createElement('span');
      h.className = 'heart-float';
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.animationDuration = (6 + Math.random() * 8) + 's';
      h.style.animationDelay = (Math.random() * 8) + 's';
      h.style.fontSize = (14 + Math.random() * 14) + 'px';
      container.appendChild(h);
    }

    // Init
    renderSlide();

    // Show close btn if only 1 slide
    if (slides.length === 1) {
      document.getElementById('closeBtn').style.display = 'block';
    }
  </script>
</body>
</html>
